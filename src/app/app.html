<div class="page-select">
    <p>select type:</p>
    @for (page of pageOptions; track page.id) {
        <a class="page-option"
            [routerLink]="page.link"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{exact:true}">
            {{page.name}}
        </a>
    }
</div>
<header></header>
<main>
    <router-outlet />
</main>
